schema_version: "1.0"

workflow:
  id: "migration-only"
  name: "DB Migration Delivery"
  version: "1.0.0"
  author: "satcom"
  description: >-
    Safe path for schema-only changes to the Delta-Global stack. Designed for
    migrations that are too substantial for the hotfix workflow (adding tables,
    dropping columns, backfills, index changes on large tables).
    Enforces SQL review gates before every apply step.
    Do NOT use for: new features (use saas-feature), bug fixes without schema changes (use hotfix).

requires:
  speckit_version: ">=0.7.2"
  integrations:
    any: ["claude", "copilot", "gemini"]

inputs:
  migration_description:
    type: string
    required: true
    prompt: "What schema change is needed? (e.g. 'Add user_preferences table', 'Drop legacy billing_v1 column set')"

  motivation:
    type: string
    required: true
    prompt: "Why is this migration needed? Link to the issue or feature that requires it."

  affected_tables:
    type: string
    required: true
    prompt: "Which tables are affected? (comma-separated: e.g. 'organizations, users, posts')"

  migration_type:
    type: string
    required: true
    enum: ["additive", "destructive", "backfill", "index"]
    prompt: >-
      Migration type:
      additive (new table / add nullable column / add index CONCURRENTLY),
      destructive (two-step drop: already soft-removed column or table),
      backfill (fill data in existing column),
      index (add/drop index on existing table)

  table_size:
    type: string
    default: "small"
    enum: ["small", "medium", "large"]
    prompt: "Estimated table size: small (<100k rows), medium (100k–10M rows), large (>10M rows)"

  integration:
    type: string
    default: "claude"
    prompt: "AI coding integration to use (claude, copilot, gemini)"

  needs_backfill_script:
    type: boolean
    default: false
    prompt: "Does this migration require a backfill script to populate existing rows?"

  rollout_strategy:
    type: string
    default: "maintenance-window"
    enum: ["maintenance-window", "online"]
    prompt: >-
      Apply strategy:
      maintenance-window (low-traffic window, apply + restart together),
      online (zero-downtime: migration runs while app is live, no restart required)

steps:
  # ──────────────────────────────────────────────────────────────────
  # PHASE 0 — Scope the migration
  # ──────────────────────────────────────────────────────────────────
  - id: scope
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: |
        Migration scope for: {{ inputs.affected_tables }}

        CHANGE: {{ inputs.migration_description }}
        MOTIVATION: {{ inputs.motivation }}
        TYPE: {{ inputs.migration_type }}
        TABLE SIZE: {{ inputs.table_size }}

        Produce a concise migration scope:
        - Exact Drizzle schema changes needed (file paths + column/table names)
        - Forward-compatibility analysis:
            additive → always safe
            destructive → confirm two-step plan (app no longer writes old column before this migration runs)
            backfill → confirm idempotency strategy
            index → CONCURRENTLY required if table > 100k rows
        - Estimated migration duration (based on table size)
        - Rollback plan: what SQL undoes this migration? (keep it runnable)
        - Zero-downtime check: can the app run with both old and new schema simultaneously?
        - CNPG operator impact: will the migration trigger a pod restart?

        Hard constraints — do NOT expand scope:
        - No application code changes in this workflow (open a saas-feature PR for those)
        - No NOT NULL on an existing column without a safe default or two-step plan
        - No DROP without confirming the application no longer references the column/table
        - No handwritten SQL — drizzle-kit generate only (except for index CONCURRENTLY — see Phase 2)
        - No schema changes to analytics-db from this workflow

  - id: review-scope
    type: gate
    message: |
      Review the migration scope before writing any code.
      Confirm:
      - Migration type is correctly identified ({{ inputs.migration_type }})
      - Forward-compatibility verified — app can run on both old and new schema
      - Rollback plan is clear and reversible
      - No scope creep into application code
      - CNPG restart impact is understood
      Table size: {{ inputs.table_size }} | Strategy: {{ inputs.rollout_strategy }}
    options: [approve, needs-more-investigation]
    on_reject: abort

  # ──────────────────────────────────────────────────────────────────
  # PHASE 1 — Branch
  # ──────────────────────────────────────────────────────────────────
  - id: branch
    type: shell
    command: "git checkout main && git pull && git checkout -b migration/{{ inputs.affected_tables | replace(', ', '-') | replace(',', '-') }}"

  # ──────────────────────────────────────────────────────────────────
  # PHASE 2 — Implement the schema change
  # ──────────────────────────────────────────────────────────────────
  - id: schema-change
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: |
        Implement the Drizzle schema change:

        CHANGE: {{ inputs.migration_description }}
        TYPE: {{ inputs.migration_type }}
        AFFECTED TABLES: {{ inputs.affected_tables }}

        Rules:
        - Edit only files in packages/db/src/schema/
        - uuid().primaryKey().defaultRandom() on any new table id
        - organizationId FK + index on any new tenant-scoped table
        - timestamps with withTimezone: true
        - drizzle-kit generate only — no handwritten SQL
        - Forward-compatible: no NOT NULL on existing column without default
        - No DROP without a documented two-step plan already in progress

        For destructive migrations (type == destructive):
        - Confirm via code search that no application code references the column/table
        - Only then add the DROP to the schema

        For index migrations (type == index):
        - Drizzle generates the CREATE INDEX statement
        - If table_size is medium or large: note that drizzle-kit will generate a standard
          CREATE INDEX; we will patch it to CONCURRENTLY in Phase 3 for safety

  - id: migration-generate
    type: shell
    command: "bun --filter @delta-global/db drizzle-kit generate"

  # ──────────────────────────────────────────────────────────────────
  # PHASE 3 — Patch for CONCURRENTLY (large tables, index type only)
  # ──────────────────────────────────────────────────────────────────
  - id: patch-concurrent-index
    type: if
    condition: "{{ inputs.migration_type == 'index' and (inputs.table_size == 'medium' or inputs.table_size == 'large') }}"
    then:
      - id: patch-index-sql
        command: speckit.tasks
        integration: "{{ inputs.integration }}"
        input:
          args: |
            The drizzle-kit generated migration SQL contains a CREATE INDEX statement on a
            {{ inputs.table_size }} table. Patch it to use CREATE INDEX CONCURRENTLY so the
            migration does not hold an exclusive lock.

            Rules:
            - Find the generated SQL file in packages/db/drizzle/
            - Replace `CREATE INDEX` with `CREATE INDEX CONCURRENTLY`
            - CONCURRENTLY cannot run inside a transaction; ensure the migration file wraps
              the index creation outside any BEGIN/COMMIT block (add `-- disable-transaction` comment
              per drizzle-kit convention if supported, otherwise document this in the PR)
            - Do not alter any other part of the migration file

  # ──────────────────────────────────────────────────────────────────
  # PHASE 4 — Backfill script (conditional)
  # ──────────────────────────────────────────────────────────────────
  - id: backfill
    type: if
    condition: "{{ inputs.needs_backfill_script == true }}"
    then:
      - id: backfill-script
        command: speckit.tasks
        integration: "{{ inputs.integration }}"
        input:
          args: |
            Write a backfill script for the migration:

            CHANGE: {{ inputs.migration_description }}
            AFFECTED TABLES: {{ inputs.affected_tables }}

            Rules:
            - Place in packages/db/scripts/backfill-<migration-name>.ts
            - Use Drizzle ORM — no raw SQL
            - Process in batches of 1000 rows with explicit cursor pagination (no OFFSET)
            - Idempotent: safe to run multiple times (use WHERE new_column IS NULL pattern)
            - Log progress: rows processed, batches complete, duration
            - Dry-run mode: accept --dry-run flag that logs but does not write
            - Include organizationId in every WHERE clause (tenant-scoped tables only)
            - Hard limit: never update more than 500k rows in a single execution without checkpoint

      - id: review-backfill
        type: gate
        message: |
          Review the backfill script before continuing.
          Confirm:
          - Idempotent (safe to re-run)
          - Batch size is reasonable for table size ({{ inputs.table_size }})
          - organizationId present in WHERE (tenant-scoped tables)
          - Dry-run flag works
          - No raw SQL
        options: [approve, reject]
        on_reject: abort

  # ──────────────────────────────────────────────────────────────────
  # PHASE 5 — SQL review gate (mandatory, human eyes)
  # ──────────────────────────────────────────────────────────────────
  - id: review-migration-sql
    type: gate
    message: |
      Review the generated SQL migration line by line before ANY apply step.

      Checklist:
      - [ ] No NOT NULL added to an existing column without a safe DEFAULT
      - [ ] No DROP TABLE / DROP COLUMN without two-step plan already complete
      - [ ] No TRUNCATE
      - [ ] Index on large table uses CONCURRENTLY (table_size: {{ inputs.table_size }})
      - [ ] Estimated lock duration is acceptable ({{ inputs.rollout_strategy }})
      - [ ] Migration is idempotent when possible (IF NOT EXISTS / IF EXISTS)
      - [ ] Rollback SQL is documented in the PR description
      - [ ] No handwritten DML (INSERT/UPDATE/DELETE) — use backfill script instead

      Migration type: {{ inputs.migration_type }}
      Table size: {{ inputs.table_size }}
      Strategy: {{ inputs.rollout_strategy }}
    options: [approve, reject]
    on_reject: abort

  # ──────────────────────────────────────────────────────────────────
  # PHASE 6 — Apply locally
  # ──────────────────────────────────────────────────────────────────
  - id: migration-apply-local
    type: shell
    command: "bun --filter @delta-global/db drizzle-kit migrate"

  - id: verify-local
    type: shell
    command: "bun --filter @delta-global/db drizzle-kit studio --port 4983 &"

  - id: verify-local-gate
    type: gate
    message: |
      Drizzle Studio is running on http://localhost:4983
      Verify the local database schema looks correct:
      - New tables / columns present with correct types
      - Indexes created
      - Foreign keys correct
      - No unexpected side effects
    options: [looks-good, something-is-wrong]
    on_reject: abort

  # ──────────────────────────────────────────────────────────────────
  # PHASE 7 — Quality gates
  # ──────────────────────────────────────────────────────────────────
  - id: quality-gates
    type: fan-out
    over:
      - { name: "biome",     cmd: "bun run lint" }
      - { name: "typecheck", cmd: "bun run typecheck" }
      - { name: "build",     cmd: "turbo run build --filter=...[HEAD^1]" }
      - { name: "gitleaks",  cmd: "gitleaks detect --no-banner" }
    step:
      type: shell
      command: "{{ item.cmd }}"

  - id: quality-aggregate
    type: fan-in
    from: quality-gates
    aggregate: >-
      All quality gates must return exit code 0. Report which gate failed
      and abort if any did.

  # ──────────────────────────────────────────────────────────────────
  # PHASE 8 — PR
  # ──────────────────────────────────────────────────────────────────
  - id: pr-description
    type: prompt
    integration: "{{ inputs.integration }}"
    prompt: |
      Generate the PR description for migration "{{ inputs.affected_tables }}":

      CHANGE: {{ inputs.migration_description }}
      MOTIVATION: {{ inputs.motivation }}
      TYPE: {{ inputs.migration_type }}
      TABLE SIZE: {{ inputs.table_size }}
      STRATEGY: {{ inputs.rollout_strategy }}

      Include:
      - Conventional Commit title: feat(db): <short description> OR fix(db): <short description>
      - What changed (exact tables/columns/indexes)
      - Why this change is forward-compatible (app can run on both old and new schema simultaneously)
      - Estimated migration duration and lock impact
      - Rollback plan: exact SQL to undo the migration
      - Apply order for {{ inputs.rollout_strategy }} strategy:
          maintenance-window: "merge → staging apply → verify → prod apply (during maintenance window)"
          online: "merge → staging apply (live) → verify 24h → prod apply (live)"
      - If backfill: backfill script invocation + expected duration
      - Link to the issue or feature that motivated this migration

  - id: ready-for-review
    type: gate
    message: |
      Quality gates green. Open the PR for review.
      Migration type: {{ inputs.migration_type }}
      Required reviewers:
        - At least 1 backend engineer who understands the schema
        - For destructive migrations: tech lead sign-off required
      Do not merge until CI is green.
    options: [approve, reject]
    on_reject: abort

  # ──────────────────────────────────────────────────────────────────
  # PHASE 9 — Deploy to staging
  # ──────────────────────────────────────────────────────────────────
  - id: deploy-staging
    type: prompt
    integration: "{{ inputs.integration }}"
    prompt: >-
      Open a PR on platform-infra updating infra/overlays/staging/ with the
      new image tag for the db package. Wait for ArgoCD staging sync.
      Confirm CNPG migration job ran before the app pod restarted.
      Check CNPG pod logs to confirm migration completed without errors.

  - id: verify-staging
    type: gate
    message: |
      Verify the migration on staging:
      - CNPG migration logs show success (no errors, no timeouts)
      - App pods healthy after restart
      - Run a quick smoke test on affected features
      - No new GlitchTip errors since deploy
      - Loki logs show clean startup
      - For backfill: run backfill script in dry-run mode on staging, verify row count
    options: [verified, failed]
    on_reject: abort

  # ──────────────────────────────────────────────────────────────────
  # PHASE 10 — Backfill on staging (conditional)
  # ──────────────────────────────────────────────────────────────────
  - id: backfill-staging
    type: if
    condition: "{{ inputs.needs_backfill_script == true }}"
    then:
      - id: run-backfill-staging
        type: prompt
        integration: "{{ inputs.integration }}"
        prompt: >-
          Run the backfill script on staging:
          bun packages/db/scripts/backfill-<migration-name>.ts

          Monitor progress logs. Confirm all rows processed.
          Run a second time to verify idempotency (should process 0 rows).

      - id: verify-backfill-staging
        type: gate
        message: |
          Verify backfill on staging:
          - All target rows populated (query COUNT of NULL values on new column = 0)
          - Re-run is idempotent (0 rows updated on second run)
          - No performance impact observed
        options: [verified, failed]
        on_reject: abort

  # ──────────────────────────────────────────────────────────────────
  # PHASE 11 — Production deploy
  # ──────────────────────────────────────────────────────────────────
  - id: prod-gate
    type: gate
    message: |
      Staging verified. Promotion to PRODUCTION requires manual confirmation.
      Type 'DEPLOY' to confirm. This is the last abort point.

      Migration type: {{ inputs.migration_type }}
      Strategy: {{ inputs.rollout_strategy }}
      Rollback: run the rollback SQL documented in the PR description.

      For maintenance-window: confirm maintenance window is active before proceeding.
      For online: migration will run live — verify app is forward-compatible.
    options: [DEPLOY, abort]
    on_reject: abort

  - id: deploy-prod
    type: prompt
    integration: "{{ inputs.integration }}"
    prompt: >-
      Open a PR on platform-infra updating infra/overlays/production/ with the
      new image tag. Wait for ArgoCD prod sync.
      Confirm CNPG migration job ran successfully before app pod restart.
      Check CNPG pod logs to confirm migration completed without errors.

  # ──────────────────────────────────────────────────────────────────
  # PHASE 12 — Backfill on production (conditional)
  # ──────────────────────────────────────────────────────────────────
  - id: backfill-prod
    type: if
    condition: "{{ inputs.needs_backfill_script == true }}"
    then:
      - id: run-backfill-prod
        type: prompt
        integration: "{{ inputs.integration }}"
        prompt: >-
          Run the backfill script on production:
          bun packages/db/scripts/backfill-<migration-name>.ts

          Monitor progress carefully. Use dry-run first, then confirm before live run.
          Watch for lock contention or slow queries in Grafana during execution.

      - id: verify-backfill-prod
        type: gate
        message: |
          Verify backfill on production:
          - All target rows populated (COUNT NULL = 0)
          - Re-run is idempotent
          - No spike in error rate or latency during backfill
          - Grafana shows no lock contention
        options: [verified, failed]
        on_reject: abort

  # ──────────────────────────────────────────────────────────────────
  # PHASE 13 — Post-deploy verification
  # ──────────────────────────────────────────────────────────────────
  - id: verify-prod
    type: gate
    message: |
      Monitor production for 30 minutes after migration apply:
      - CNPG pod logs: no errors
      - App pods: all healthy, no crash loops
      - GlitchTip: zero new errors related to affected tables
      - Grafana: p95 latency normal, error rate at baseline
      - DB metrics: no unusual lock waits, normal query times on affected tables
      Rollback is available: see PR description for rollback SQL.
    options: [stable, rollback-needed]
    on_reject: abort

  # ──────────────────────────────────────────────────────────────────
  # PHASE 14 — Documentation
  # ──────────────────────────────────────────────────────────────────
  - id: docs
    type: prompt
    integration: "{{ inputs.integration }}"
    prompt: |
      Document the migration for future reference:

      CHANGE: {{ inputs.migration_description }}
      TYPE: {{ inputs.migration_type }}
      AFFECTED TABLES: {{ inputs.affected_tables }}

      Update or create:
      1. docs/database/schema-changelog.md — append an entry:
         ## [DATE] {{ inputs.migration_type }}: {{ inputs.affected_tables }}
         - What changed
         - Why
         - PR link
         - Rollback SQL

      2. If a new table was added: update docs/database/schema-overview.md
         with a brief description of the new table and its purpose.

      Keep entries concise. This log is for future engineers running migrations
      or debugging data issues.
